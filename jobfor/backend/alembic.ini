# ─────────────────────────────────────────────────────────────
# Alembic configuration — JobFor Backend
# NOTE: sqlalchemy.url is overridden at runtime by migrations/env.py
#       using the DATABASE_URL from app.core.config.settings,
#       so the value below is a safe placeholder only.
# ─────────────────────────────────────────────────────────────

[alembic]
script_location = migrations

# Overridden dynamically in env.py — do NOT hard-code credentials here.
sqlalchemy.url = postgresql+psycopg2://jobfor:jobfor_secret@localhost:5432/jobsearch

# Generate migration scripts with readable names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Prepend sys.path so `app` package is importable when running alembic CLI
prepend_sys_path = .

# Truncate long revision slug names in file names
truncate_slug_length = 40

# Timezone stored in migration files
timezone = UTC

[post_write_hooks]
# Optionally apply black formatting to generated migration files:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
